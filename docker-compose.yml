services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redes2-server
    hostname: server
    cap_add:
      - NET_ADMIN
    networks:
      redes_net:
        ipv4_address: 172.28.0.10
    command: >
      bash -c "python3 src/tcp_server.py --host 0.0.0.0 &
             python3 src/rudp_server.py --host 0.0.0.0 &
             wait"
    volumes:
      - .:/app
    
  client:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redes2-client
    hostname: client
    cap_add:
      - NET_ADMIN
    depends_on:
      - server
    networks:
      redes_net:
        ipv4_address: 172.28.0.20
    volumes:
      - .:/app
    stdin_open: true
    tty: true

networks:
  redes_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

      